<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ETH 15分钟结构反转系统</title>

<style>
body{font-family:Arial;text-align:center;background:#111;color:#fff}
.green{color:#00ff88}
.red{color:#ff4444}
.yellow{color:#ffcc00}
.gray{color:#aaa}
button{padding:10px 20px;margin:10px;font-size:16px}
</style>
</head>

<body>

<h2>ETH 15分钟结构反转捕捉</h2>

<button onclick="enableSound()">🔊 启动报警</button>

<h3>当前价格：<span id="price">-</span></h3>
<h3>市场状态：<span id="status">-</span></h3>
<h3>信号：<span id="signal">-</span></h3>
<h3>止损：<span id="sl">-</span></h3>
<h3>止盈：<span id="tp">-</span></h3>

<script>

let audioCtx;
let soundEnabled=false;

function enableSound(){
audioCtx = new (window.AudioContext || window.webkitAudioContext)();
soundEnabled=true;
alert("报警已启动");
}

function beep(){
if(!soundEnabled) return;
let oscillator = audioCtx.createOscillator();
let gainNode = audioCtx.createGain();
oscillator.connect(gainNode);
gainNode.connect(audioCtx.destination);
oscillator.frequency.value = 900;
oscillator.type = "sine";
gainNode.gain.value = 0.3;
oscillator.start();
setTimeout(()=>{oscillator.stop();},300);
}

async function fetchData(){

let res = await fetch("https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=120");
let data = await res.json();

let closes = data.map(c=>parseFloat(c[4]));
let highs = data.map(c=>parseFloat(c[2]));
let lows = data.map(c=>parseFloat(c[3]));
let opens = data.map(c=>parseFloat(c[1]));

let price = closes[closes.length-1];
document.getElementById("price").innerText=price.toFixed(2);

function MA(arr,p){return arr.slice(-p).reduce((a,b)=>a+b)/p;}
let ma7=MA(closes,7);
let ma25=MA(closes,25);

function RSI(values,period=14){
let gains=0,losses=0;
for(let i=values.length-period;i<values.length-1;i++){
let diff=values[i+1]-values[i];
if(diff>0) gains+=diff;
else losses-=diff;
}
let rs=gains/(losses||1);
return 100-(100/(1+rs));
}
let rsi=RSI(closes);

let recentHigh=Math.max(...highs.slice(-3));
let recentLow=Math.min(...lows.slice(-3));

let status="趋势判断中";
let signal="等待";
let sl="-";
let tp="-";

/* ===== 空头反转捕捉 ===== */
if(rsi>65 && closes[closes.length-1]<recentLow){

status="顶部反转";
signal="🔴 结构破位做空";
sl=(recentHigh+5).toFixed(2);
tp=(price-40).toFixed(2);
document.getElementById("signal").className="red";
beep();
}

/* ===== 多头反转捕捉 ===== */
else if(rsi<35 && closes[closes.length-1]>recentHigh){

status="底部反转";
signal="🟢 结构突破做多";
sl=(recentLow-5).toFixed(2);
tp=(price+40).toFixed(2);
document.getElementById("signal").className="green";
beep();
}

else{

status="无结构反转";
signal="等待破位";
document.getElementById("signal").className="yellow";
}

document.getElementById("status").innerText=status;
document.getElementById("signal").innerText=signal;
document.getElementById("sl").innerText=sl;
document.getElementById("tp").innerText=tp;

}

fetchData();
setInterval(fetchData,15000);

</script>

</body>
</html>
