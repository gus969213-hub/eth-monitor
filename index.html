<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ETH 15M 专业入场系统</title>
<style>
body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
}
.big{font-size:24px;margin:12px;}
.green{color:#00ff88;}
.red{color:#ff4d4d;}
.gray{color:#888;}
.yellow{color:#ffd700;}
</style>
</head>
<body>

<h1>ETH 15分钟专业系统</h1>

<div class="big">当前价格：<span id="price">加载中...</span></div>
<div class="big">趋势方向：<span id="trend">计算中</span></div>
<div class="big">推荐入场区间：<span id="zone">等待</span></div>
<div class="big">当前是否安全：<span id="safe">-</span></div>
<div class="big">是否允许进场：<span id="allow">-</span></div>
<div class="big">止损：<span id="sl">-</span></div>
<div class="big">止盈：<span id="tp">-</span></div>

<script>

async function fetchData(){
let res = await fetch("https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=80");
let data = await res.json();
let closes = data.map(c => parseFloat(c[4]));
let price = closes[closes.length-1];

document.getElementById("price").innerText = price.toFixed(2);

function MA(arr,p){
return arr.slice(-p).reduce((a,b)=>a+b)/p;
}

let ma7 = MA(closes,7);
let ma25 = MA(closes,25);

function RSI(values,period=14){
let gains=0,losses=0;
for(let i=values.length-period;i<values.length-1;i++){
let diff=values[i+1]-values[i];
if(diff>0) gains+=diff;
else losses-=diff;
}
let rs=gains/(losses||1);
return 100-(100/(1+rs));
}

let rsi = RSI(closes);

let trend="震荡";
let zone="-";
let safe="否";
let allow="等待";
let sl="-";
let tp="-";

let ma25Slope = ma25 - MA(closes.slice(0,-1),25);

if(ma7 < ma25 && ma25Slope < 0){
trend="空头趋势";
document.getElementById("trend").className="red";

let zoneLow = ma25 - 5;
let zoneHigh = ma25 + 5;
zone = zoneLow.toFixed(2)+" - "+zoneHigh.toFixed(2);

if(price >= zoneLow && price <= zoneHigh){
safe="在安全区";
document.getElementById("safe").className="green";

if(rsi < 50){
allow="允许做空";
document.getElementById("allow").className="red";
sl=(price+20).toFixed(2);
tp=(price-40).toFixed(2);
}
}else{
safe="不在安全区";
document.getElementById("safe").className="gray";
}

}else if(ma7 > ma25 && ma25Slope > 0){
trend="多头趋势";
document.getElementById("trend").className="green";

let zoneLow = ma25 - 5;
let zoneHigh = ma25 + 5;
zone = zoneLow.toFixed(2)+" - "+zoneHigh.toFixed(2);

if(price >= zoneLow && price <= zoneHigh){
safe="在安全区";
document.getElementById("safe").className="green";

if(rsi > 50){
allow="允许做多";
document.getElementById("allow").className="green";
sl=(price-20).toFixed(2);
tp=(price+40).toFixed(2);
}
}else{
safe="不在安全区";
document.getElementById("safe").className="gray";
}

}else{
trend="震荡区域";
document.getElementById("trend").className="yellow";
zone="禁止交易";
}

document.getElementById("zone").innerText=zone;
document.getElementById("safe").innerText=safe;
document.getElementById("allow").innerText=allow;
document.getElementById("sl").innerText=sl;
document.getElementById("tp").innerText=tp;

}

fetchData();
setInterval(fetchData,60000);

</script>

</body>
</html>
